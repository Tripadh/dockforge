<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockForge - Code Executor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>DockForge</h1>
            <p class="subtitle">Sandboxed Code Execution</p>
        </header>

        <main>
            <section class="editor-section">
                <div class="controls">
                    <select id="language">
                        <option value="python">Python</option>
                        <option value="node">Node.js</option>
                    </select>
                    <button id="run-btn">Run Code</button>
                </div>
                <textarea id="code" placeholder="Enter your code here...">print("Hello, DockForge!")</textarea>
            </section>

            <section class="output-section">
                <div class="status-bar">
                    <span class="status-label">Status:</span>
                    <span id="status" class="status-value">Ready</span>
                </div>

                <div class="output-panel">
                    <div class="output-block">
                        <h3>stdout</h3>
                        <pre id="stdout"></pre>
                    </div>
                    <div class="output-block">
                        <h3>stderr</h3>
                        <pre id="stderr"></pre>
                    </div>
                </div>

                <div id="execution-info" class="execution-info"></div>
            </section>
        </main>

        <footer>
            <p>DockForge &copy; 2026</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
