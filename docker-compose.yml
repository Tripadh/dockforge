services:

  mysql:
    image: mysql:8.0
    container_name: dockforge_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --sql-mode="STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"
    networks:
      - dockforge_internal

  redis:
    image: redis:7-alpine
    container_name: dockforge_redis
    restart: unless-stopped
    networks:
      - dockforge_internal

  backend:
    build: ./backend
    container_name: dockforge_backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV}
    networks:
      - dockforge_internal

  worker:
    build: ./worker
    container_name: dockforge_worker
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      EXECUTION_TIMEOUT: ${EXECUTION_TIMEOUT}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - dockforge_internal

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: dockforge_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - dockforge_internal

networks:
  dockforge_internal:
    driver: bridge

volumes:
  mysql_data: